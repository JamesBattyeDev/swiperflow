<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoplay Slider</title>
  <style>
    .swiper-wrapper-el { overflow: hidden; }
    .swiper-list { display: flex; }
    .swiper-item { flex-shrink: 0; width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="swiper-component" data-swf-component="autoplay">
    <div class="swiper-wrapper-el" data-swf-element="wrapper">
      <div class="swiper-list" data-swf-element="list"
           data-swf-autoplay
           data-swf-autoplay-delay="500"
           data-swf-speed="100"
           data-swf-loop>
        <div class="swiper-item" data-swf-element="item">Auto 1</div>
        <div class="swiper-item" data-swf-element="item">Auto 2</div>
        <div class="swiper-item" data-swf-element="item">Auto 3</div>
      </div>
    </div>
  </div>
  <script defer src="/dist/index.js"></script>
</body>
</html>
