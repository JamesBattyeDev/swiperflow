<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loop Slider</title>
  <style>
    .swiper-wrapper-el { overflow: hidden; }
    .swiper-list { display: flex; }
    .swiper-item { flex-shrink: 0; width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; }
    .swiper-nav { display: flex; gap: 8px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="swiper-component" data-swf-component="loop-slider">
    <div class="swiper-wrapper-el" data-swf-element="wrapper">
      <div class="swiper-list" data-swf-element="list"
           data-swf-loop
           data-swf-speed="100"
           data-swf-additional="2">
        <div class="swiper-item" data-swf-element="item">Loop 1</div>
        <div class="swiper-item" data-swf-element="item">Loop 2</div>
        <div class="swiper-item" data-swf-element="item">Loop 3</div>
        <div class="swiper-item" data-swf-element="item">Loop 4</div>
      </div>
    </div>
    <div class="swiper-nav" data-swf-element="navigation">
      <button class="swiper-arrow" data-swf-element="prev-arrow">Prev</button>
      <button class="swiper-arrow" data-swf-element="next-arrow">Next</button>
    </div>
  </div>
  <script defer src="/dist/index.js"></script>
</body>
</html>
